<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comics traduis par Jamblond</title>
  <meta name="description" content="Autres webcomics traduits">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="theme-neon.css" />

  <style>
    /* === STICKY FOOTER === */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    .comics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 28px;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .comic-card {
      background: #2a5a9b;
      border: 3px solid rgba(56,243,255,.4);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all .3s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,.4);
    }

    .comic-card:hover {
      transform: translateY(-10px);
      border-color: var(--c-pink);
      box-shadow: 0 0 30px rgba(255,101,247,.4);
    }

    .comic-card img {
      width: 100%;
      height: 280px;
      object-fit: contain;
      background: #1e2a4a;
      display: block;
      padding: 15px 15px 10px;
    }

    .comic-info {
      padding: 12px 10px 18px;
      text-align: center;
      background: rgba(0,0,0,.25);
    }

    .comic-title {
      font-size: 1.28rem;
      font-weight: 700;
      margin: 4px 0 6px;
      color: #fff;
    }

    .comic-subtitle {
      font-size: 0.98rem;
      color: var(--c-pink);
      opacity: 0.95;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Traductions de Jamblond</h1>
      </div>
      <nav>
        <a href="https://discord.gg/QubjngQPgf" target="_blank">Discord</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="comics-grid" id="comics-grid"></div>
  </main>

  <footer><small>© 2025–2026 CuterKisser. Tous droits réservés. Template utilisé sous licence personnelle accordée uniquement à Jamblond.</small></footer>

  <script>
    const otherComics = [
      {
        title: "I Think I Like You VF",
        subtitle: "Heru & Syd (traduit par CuterKisser)",
        image: "https://github.com/Jamblond/BooBeMineVF/blob/main/itily-cover.webp?raw=true",
        url: "https://ithinkilikeyou.fr/"
      },
      {
        title: "Boo Be Mine VF",
        subtitle: "celticMW (traduit par Jamblond)",
        image: "https://github.com/Jamblond/BooBeMineVF/blob/main/icon.png?raw=true",
        url: "https://boobemine.fr/"
      },
      {
        title: "The Angel in the Forest VF",
        subtitle: "Yinller (traduit par Jamblond)",
        image: "https://github.com/Jamblond/BooBeMineVF/blob/main/Angel-forest-cover.jpg?raw=true",
        url: "https://www.furaffinity.net/gallery/jamblond/folder/1682396/The-Angel-in-the-Forest-VF/"
      },
      {
        title: "Duncan and Eddie VF",
        subtitle: "doginacafe (traduit par Jamblond)",
        image: "https://github.com/Jamblond/BooBeMineVF/blob/main/DnE-cover.png?raw=true",
        url: "https://www.furaffinity.net/gallery/jamblond/folder/1682397/Duncan-and-Eddie-VF/"
      },
      {
        title: "Weekend VF (18+)",
        subtitle: "Zeta-Haru (traduit par Jamblond)",
        image: "https://github.com/Jamblond/BooBeMineVF/blob/main/weekend-cover.png?raw=true",
        url: "https://www.furaffinity.net/gallery/jamblond/folder/1682397/Duncan-and-Eddie-VF/"
      }
    ];

    const grid = document.getElementById('comics-grid');

    otherComics.forEach(comic => {
      const card = document.createElement('a');
      card.href = comic.url;
      card.target = comic.url.startsWith('http') ? "_blank" : "_self";
      card.className = "comic-card";

      card.innerHTML = `
        <img src="${comic.image}" alt="${comic.title}" loading="lazy" class="responsive">
        <div class="comic-info">
          <div class="comic-title">${comic.title}</div>
          <div class="comic-subtitle">${comic.subtitle}</div>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
