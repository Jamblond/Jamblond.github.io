<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comics traduis par Jamblond</title>
  <meta name="description" content="Autres webcomics traduits">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="theme-neon.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    /* === STICKY FOOTER === */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }

    /* === HEADER RESPONSIVE === */
    header {
      width: 100%;
      box-sizing: border-box;
    }

    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      gap: 1rem;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    nav a {
      padding: 0.6rem 1rem;
      font-size: clamp(0.9rem, 2vw, 1rem);
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    /* === GRID LAYOUT - MOBILE FIRST === */
    .comics-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1rem, 4vw, 2rem);
      padding: clamp(1.5rem, 5vw, 2.5rem);
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* === COMIC CARD RESPONSIVE === */
    .comic-card {
      background: #2a5a9b;
      border: 3px solid rgba(56,243,255,.4);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all .3s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,.4);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .comic-card:hover {
      transform: translateY(-10px);
      border-color: var(--c-pink);
      box-shadow: 0 0 30px rgba(255,101,247,.4);
    }

    .comic-card:active {
      transform: translateY(-5px);
    }

    .comic-card img {
      width: 100%;
      aspect-ratio: 1 / 1.12;
      object-fit: contain;
      background: #1e2a4a;
      display: block;
      padding: clamp(0.75rem, 2vw, 1rem);
    }

    .comic-info {
      padding: clamp(0.75rem, 2vw, 1.25rem);
      text-align: center;
      background: rgba(0,0,0,.25);
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .comic-title {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      margin: 0.25rem 0 0.4rem;
      color: #fff;
      line-height: 1.3;
    }

    .comic-subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--c-pink);
      opacity: 0.95;
      line-height: 1.4;
    }

    /* === FOOTER RESPONSIVE === */
    footer {
      width: 100%;
      box-sizing: border-box;
      padding: clamp(1rem, 3vw, 2rem);
      text-align: center;
    }

    footer small {
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      line-height: 1.5;
    }

    /* === TABLET BREAKPOINT (600px) === */
    @media (min-width: 600px) {
      .comics-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* === TABLET BREAKPOINT (768px) === */
    @media (min-width: 768px) {
      .comics-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      nav {
        width: auto;
        justify-content: flex-end;
      }

      .header-inner {
        flex-direction: row;
        align-items: center;
      }
    }

    /* === DESKTOP BREAKPOINT (1024px) === */
    @media (min-width: 1024px) {
      .comics-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Traductions de Jamblond</h1>
      </div>
      <nav>
        <a href="https://discord.gg/QubjngQPgf" target="_blank">Discord</a><a href="https://t.me/Jamblondletaidum" target="_blank">Telegram</a><a href="https://www.furaffinity.net/controls/journal/" target="_blank">FurAffinity</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="comics-grid" id="comics-grid"></div>
  </main>

  <footer><small>© 2025–2026 CuterKisser. Tous droits réservés. Template utilisé sous licence personnelle accordée uniquement à Jamblond.</small></footer>

  <script>
        const otherComics = [
      {
        title: "I Think I Like You VF",
        subtitle: "Heru & Syd (traduit par CuterKisser)",
        image: "itily-cover-1.webp",
        url: "https://ithinkilikeyou.fr/"
      },
      {
        title: "Boo Be Mine VF",
        subtitle: "celticMW (traduit par Jamblond)",
        image: "icon.png",
        url: "https://boobemine.fr/"
      },
      {
        title: "The Angel in the Forest VF",
        subtitle: "Yinller (traduit par Jamblond)",
        image: "Angel-forest-cover.jpg",
        url: "The Angel in the Forest VF"
      },
      {
        title: "Duncan and Eddie VF",
        subtitle: "doginacafe (traduit par Jamblond)",
        image: "DnE-cover.png",
        url: "Duncan and Eddie VF"
      },
      {
        title: "Weekend VF (18+)",
        subtitle: "Zeta-Haru (traduit par Jamblond)",
        image: "weekend-cover.png",
        url: "Weekend VF"
      },
      {
        title: "Furscience.fr",
        subtitle: "Furscience VF - PROJET NON OFFICIEL",
        image: "document.png",
        url: "Furscience.fr"
      },
      {
        title: "Wikipédia",
        subtitle: "Articles Wikipédia Anglais traduis en Français et inversement",
        image: "wikipedia.png",
        url: "https://en.wikipedia.org/wiki/User:Jamblond"
      },
      {
        title: "Projets Open-sources/GNU/Linux",
        subtitle: "Projets Open-sources et documentations auxquels je contribue en les traduisant en Français ou en Anglais",
        image: "linux.png",
        url: "https://github.com/jamblond/"
      },
      {
        title: "Projet Steam-Wiki",
        subtitle: "Projet de documentation communautaire de Steam (<<Le Wikipédia de Steam>>)",
        image: "Steam-wiki.png",
        url: ""
      },
      {
        title: "Bientôt",
        subtitle: "D'autres projets seront ajoutés à cette liste au cours du mois. Plus d'infos sur le groupe Discord et mon profil FurAffinity.",
        image: "work-in-progress.png",
        url: "https://www.furaffinity.net/user/jamblond"
      }      
    ];

    const grid = document.getElementById('comics-grid');

    otherComics.forEach(comic => {
      const card = document.createElement('a');
      card.href = comic.url;
      card.target = comic.url.startsWith('http') ? "_blank" : "_self";
      card.className = "comic-card";

      card.innerHTML = `
        <img src="${comic.image}" alt="${comic.title}" loading="lazy" class="responsive">
        <div class="comic-info">
          <div class="comic-title">${comic.title}</div>
          <div class="comic-subtitle">${comic.subtitle}</div>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
